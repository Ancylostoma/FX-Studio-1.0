name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      # El navegador no sube archivos que empiezan con punto al arrastrarlos,
      # así que este .env.example (que el plugin de secrets exige que exista)
      # lo creamos aquí directamente en cada build.
      - name: Create secrets placeholder file
        run: echo "GEMINI_API_KEY=not_used" > .env.example

      # Tampoco subió debug.keystore; lo generamos con las mismas contraseñas
      # que ya están configuradas en app/build.gradle.kts.
      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fotoestudio-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
